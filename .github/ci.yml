name: CI - Docker Build & Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build ./app -t it-dashboard:latest

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name test-app it-dashboard:latest
          sleep 10

      - name: Test application health endpoint
        run: curl http://localhost:5000/health

      - name: Show container logs
        run: docker logs test-app

      - name: Stop and remove container
        if: always()
        run: docker rm -f test-app || true 
        